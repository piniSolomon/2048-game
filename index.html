<body>
    <div id="container">
        <header>
            <div class="title-row">
                <h1>2048</h1>
                <div class="scores">
                    <div class="score-box">
                        <div class="score-label">SCORE</div>
                        <div id="score">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">BEST</div>
                        <div id="best">0</div>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                <p class="tagline">Join the numbers and get to the <strong>2048 tile!</strong></p>
                <div class="btn-group">
                    <button id="undo-btn" title="Undo (Ctrl+Z)">&#x21A9;</button>
                    <button id="dark-mode-btn" title="Toggle dark mode">&#x263D;</button>
                    <button id="new-game-btn">New Game</button>
                </div>
            </div>
        </header>

        <div id="game-board">
            <div id="grid-bg"></div>
            <div id="tiles"></div>
        </div>

        <div id="game-message" class="hidden">
            <p id="message-text"></p>
            <button id="message-btn">Try again</button>
        </div>

        <footer>
            <p><strong>HOW TO PLAY:</strong> Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles. When two tiles with the same number touch, they <strong>merge into one!</strong></p>
        </footer>
    </div>
    <script src="game.js"></script>
